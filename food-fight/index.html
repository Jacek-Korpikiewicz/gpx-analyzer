<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polish Food Fight — punchyaf.cc</title>
<meta name="description" content="Vote for the best of four Polish dishes that terrify tourists: kaszanka, czernina, flaki, wątróbka.">
<meta property="og:title" content="Polish Food Fight">
<meta property="og:description" content="Four dishes that terrify tourists. Which one reigns supreme? Cast your vote.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://punchyaf.cc/food-fight/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c0a;--panel:#11140f;--card:#161a14;--border:#1f2418;--border-hi:#2d3424;
    --text:#d4d8c8;--text-dim:#7a7f6e;--text-mute:#4a4f42;--accent:#c8ff5a;
    --accent-glow:rgba(200,255,90,0.12);
    --font-mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
    --font-display:'Inter Tight',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font-mono);background:var(--bg);color:var(--text);
    min-height:100vh;font-size:13px;display:flex;align-items:flex-start;justify-content:center;
    padding:40px 16px;line-height:1.5;
  }
  .wrap{width:100%;max-width:440px}
  .kicker{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
  h1{font-family:var(--font-display);font-weight:800;font-size:clamp(32px,9vw,46px);line-height:.95;margin-bottom:10px}
  h1 .a{color:var(--accent)}
  .hook{font-size:12px;color:var(--text-dim);margin-bottom:24px;max-width:36ch}
  .state-label{font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.16em;margin-bottom:10px}

  .rows{display:flex;flex-direction:column;gap:8px}
  .row{
    position:relative;background:var(--card);border:1px solid var(--border);
    padding:13px 14px;display:flex;align-items:center;gap:11px;overflow:hidden;
    text-align:left;width:100%;color:inherit;font:inherit;
    transition:border-color .15s,transform .08s;
  }
  .row .emoji{font-size:22px;line-height:1}
  .row .name{flex:1;font-size:13px;letter-spacing:.04em}
  .row .sub{font-size:9px;color:var(--text-mute);letter-spacing:.02em}
  /* voting state */
  .ballot .row{cursor:pointer}
  .ballot .row:hover{border-color:var(--accent);background:var(--accent-glow)}
  .ballot .row:active{transform:translateY(1px)}
  /* results state */
  .fill{position:absolute;inset:0 auto 0 0;width:0;background:var(--accent-glow);
    border-right:1px solid var(--accent);transition:width .9s cubic-bezier(.22,1,.36,1)}
  .pct{font-size:13px;font-weight:700;color:var(--accent);z-index:1;min-width:42px;text-align:right}
  .row .name,.row .emoji{z-index:1}
  .row.win{border-color:var(--border-hi)}

  .foot{margin-top:22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .total{font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase}
  .total b{color:var(--accent);font-size:13px}
  .share{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    border:1px solid var(--border-hi);background:none;color:var(--text-dim);padding:9px 16px;cursor:pointer;
    transition:border-color .15s,color .15s}
  .share:hover{border-color:var(--accent);color:var(--accent)}

  .note{margin-top:18px;font-size:10px;color:var(--text-mute);letter-spacing:.02em}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--card);border:1px solid var(--accent);color:var(--accent);
    padding:10px 18px;font-size:11px;letter-spacing:.06em;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .err{color:#ff6a5a}
  [hidden]{display:none!important}
</style>
</head>
<body>
  <main class="wrap">
    <div class="kicker">punchyaf.cc / vote</div>
    <h1>POLISH FOOD <span class="a">FIGHT</span></h1>
    <p class="hook">Four dishes that terrify tourists. Which one reigns supreme? One vote — choose wisely.</p>

    <div class="state-label" id="stateLabel">Cast your vote</div>
    <div class="rows ballot" id="rows" aria-live="polite"></div>

    <div class="foot">
      <span class="total" id="total" hidden>Votes <b id="totalNum">0</b></span>
      <button class="share" id="share" type="button">Share ↗</button>
    </div>
    <p class="note" id="note"></p>
  </main>

  <div class="toast" id="toast"></div>

<script type="module">
const DISHES = [
  { slug:'kaszanka', label:'kaszanka', emoji:'🩸', sub:'blood sausage' },
  { slug:'czernina', label:'czernina', emoji:'🦆', sub:'duck blood soup' },
  { slug:'flaki',    label:'flaki',    emoji:'🫃', sub:'tripe soup' },
  { slug:'watrobka', label:'wątróbka', emoji:'🫀', sub:'liver' },
];
const VOTED_KEY = 'foodfight.voted';

const $rows = document.getElementById('rows');
const $stateLabel = document.getElementById('stateLabel');
const $total = document.getElementById('total');
const $totalNum = document.getElementById('totalNum');
const $note = document.getElementById('note');
const $toast = document.getElementById('toast');

let busy = false;

function metaFor(slug){ return DISHES.find(d => d.slug === slug); }

function renderBallot(){
  $stateLabel.textContent = 'Cast your vote';
  $rows.classList.add('ballot');
  $rows.innerHTML = '';
  for(const d of DISHES){
    const btn = document.createElement('button');
    btn.className = 'row';
    btn.type = 'button';
    btn.dataset.slug = d.slug;
    btn.innerHTML =
      `<span class="emoji">${d.emoji}</span>`+
      `<span class="name">${d.label}<div class="sub">${d.sub}</div></span>`;
    btn.addEventListener('click', () => castVote(d.slug));
    $rows.appendChild(btn);
  }
}

function renderResults(data){
  $stateLabel.textContent = 'Live results';
  $rows.classList.remove('ballot');
  $rows.innerHTML = '';
  data.dishes.forEach((d, i) => {
    const meta = metaFor(d.slug) || d;
    const div = document.createElement('div');
    div.className = 'row' + (i === 0 && data.total > 0 ? ' win' : '');
    div.innerHTML =
      `<span class="fill"></span>`+
      `<span class="emoji">${meta.emoji}</span>`+
      `<span class="name">${meta.label}</span>`+
      `<span class="pct">${d.pct}%</span>`;
    $rows.appendChild(div);
    // animate fill on next frame
    requestAnimationFrame(() => {
      div.querySelector('.fill').style.width = d.pct + '%';
    });
  });
  $totalNum.textContent = data.total.toLocaleString('en-US');
  $total.hidden = false;
}

async function loadVotes(){
  const res = await fetch('/api/votes');
  if(!res.ok) throw new Error('votes ' + res.status);
  return res.json();
}

async function castVote(slug){
  if(busy) return;
  busy = true;
  try{
    const res = await fetch('/api/vote', {
      method:'POST',
      headers:{ 'content-type':'application/json' },
      body: JSON.stringify({ slug }),
    });
    if(res.ok){
      const data = await res.json();
      try{ localStorage.setItem(VOTED_KEY, slug); }catch{}
      renderResults(data);
    } else {
      $note.innerHTML = '<span class="err">Could not record vote — tap to retry.</span>';
    }
  }catch{
    $note.innerHTML = '<span class="err">Network hiccup — tap a dish to retry.</span>';
  }finally{
    busy = false;
  }
}

function showToast(msg){
  $toast.textContent = msg;
  $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), 1800);
}

document.getElementById('share').addEventListener('click', async () => {
  const url = 'https://punchyaf.cc/food-fight/';
  const shareData = { title:'Polish Food Fight', text:'Vote for the best terrifying Polish dish:', url };
  if(navigator.share){
    try{ await navigator.share(shareData); }catch{}
  } else {
    try{ await navigator.clipboard.writeText(url); showToast('Link copied ✓'); }
    catch{ showToast(url); }
  }
});

async function init(){
  const hasVoted = (() => { try{ return !!localStorage.getItem(VOTED_KEY); }catch{ return false; } })();
  try{
    const data = await loadVotes();
    if(hasVoted) renderResults(data);
    else renderBallot();
  }catch{
    // Backend unavailable: show ballot shell but make clear results are down.
    renderBallot();
    $stateLabel.textContent = 'Results unavailable';
    $note.innerHTML = '<span class="err">Live results are temporarily unavailable.</span>';
  }
}

init();
</script>
</body>
</html>
